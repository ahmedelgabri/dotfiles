# vim: ft=tmux

# =======================================================================
# = Terminal
# =======================================================================

set -g default-terminal "$TERM"
set -ga terminal-features ",*:usstyle"                                    # undercurl
set -gs terminal-overrides ",*:RGB"                                       # RGB color (SGR)
set-option -as terminal-overrides ',xterm-kitty:blink=\E[5m'              # blinking text (Kitty)
set-option -as terminal-overrides ',xterm-ghostty:Smol=\E[53m:Rmol=\E[55m' # overline (Ghostty)

# =======================================================================
# = General
# =======================================================================

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Timing
set -sg escape-time 1                                                     # https://github.com/neovim/neovim/wiki/FAQ#esc-in-tmux-or-gnu-screen-is-delayed
set -g display-time 1500
set -g display-panes-time 2000

# Scrollback
set -g history-limit 1000000

# Input
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u
set -g mouse on
set -g mode-keys vi

# Windows & panes
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string '#h ❐ #S ● #I #W'
set -g other-pane-height 25
set -g other-pane-width 80

# Activity
set -g monitor-activity on
set -g visual-activity off

# Passthrough (base16-shell, yazi image preview)
# https://yazi-rs.github.io/docs/image-preview/
set -gq allow-passthrough on

# Clipboard (OSC 52 — works in both Kitty and Ghostty)
set -g set-clipboard on

# =======================================================================
# = Key Bindings — Navigation
# =======================================================================

# Smart pane switching with awareness of Vim splits.
# https://github.com/christoomey/vim-tmux-navigator
%hidden VIM_PATTERN='(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'
%hidden IS_VIM="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${VIM_PATTERN}'"

bind-key -n 'C-h' if-shell "$IS_VIM" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$IS_VIM" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$IS_VIM" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$IS_VIM" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$IS_VIM" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Window navigation
bind-key -n S-Left  previous-window
bind-key -n S-Right next-window
bind-key -n C-S-Left  swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# =======================================================================
# = Key Bindings — Windows & Panes
# =======================================================================

unbind-key c
bind-key c   new-window -ac '#{pane_current_path}'
bind-key v   split-window -h -c "#{pane_current_path}"
bind-key s   split-window -v -c "#{pane_current_path}"
bind-key x   kill-pane
bind-key b   break-pane -d
bind-key C-o rotate-window
bind-key q   display-panes
bind-key C-p choose-tree -Z
bind-key C-q confirm-before 'kill-session'

# Layouts
bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical

# Resizing
unbind-key Left
unbind-key Right
unbind-key Down
unbind-key Up
bind-key -r Left  resize-pane -L 10
bind-key -r Right resize-pane -R 10
bind-key -r Down  resize-pane -D 10
bind-key -r Up    resize-pane -U 10

# =======================================================================
# = Key Bindings — Copy Mode
# =======================================================================

bind-key -T copy-mode-vi v                  send-keys -X begin-selection
bind-key -T copy-mode-vi V                  send-keys -X select-line
bind-key -T copy-mode-vi r                  send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape             send-keys -X cancel
bind-key -T copy-mode-vi y                  send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-selection-and-cancel

# Save entire tmux history to a file
bind-key * command-prompt -p 'save history to filename:' -I '~/tmux.history' 'capture-pane -S -32768 ; save-buffer %1 ; delete-buffer'

# =======================================================================
# = Key Bindings — Mouse
# =======================================================================

bind-key -n WheelUpPane   if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

bind-key -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
} {
  copy-mode -M
}

bind-key -T root WheelUpPane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" {
  send-keys -M
} {
  copy-mode -e
}

# =======================================================================
# = Key Bindings — Popups
# =======================================================================

# Persistent popup shell per directory:
# - Creates a unique session name using directory basename (6 chars) + MD5 hash (8 chars)
#   e.g., "popup_dotfil_a3f2b1c9" for ~/.dotfiles
# - Session persists when popup is closed (toggle with prefix+p)
# - Status bar is hidden inside popup sessions
# - Uses (md5 || md5sum) for macOS/Linux compatibility
# - Pattern match #{m:popup_*,...} detects if we're inside a popup session
bind-key -N "Toggle persistent popup per directory" p \
    if-shell -F '#{m:popup_*,#{session_name}}' {
        detach-client
    } {
        display-popup -d '#{pane_current_path}' -E -x R -y 0 -w 40% -h 100% '\
            prefix="$(basename "$PWD" | tr -cd "a-zA-Z0-9" | cut -c1-6)"; \
            hash="$(printf "%s" "$PWD" | (md5 2>/dev/null || md5sum) | cut -c1-8)"; \
            name="popup_${prefix}_${hash}"; \
            tmux has-session -t "$name" 2>/dev/null || tmux new-session -d -s "$name"; \
            tmux set-option -t "$name" status off; \
            tmux set-option -t "$name" pane-border-status off; \
            tmux attach-session -t "$name"'
    }

# Quick popup shell
bind t display-popup -d "#{pane_current_path}" -w "75%" -h "75%" "$SHELL -l"

# =======================================================================
# = Appearance — Colors
# =======================================================================

set -g message-style         bg=terminal,fg=brightred
set -g message-command-style bg=black,fg=blue

# =======================================================================
# = Appearance — Panes
# =======================================================================

set -g pane-border-style        bg=terminal,fg=colour235
set -g pane-active-border-style bg=terminal,fg=colour235
set -g pane-border-status top

# Copy mode indicator in pane border
# https://github.com/wincent/wincent/blob/c02f91d6/aspects/dotfiles/files/.config/tmux/tmux.conf
#
# Shows position as offset from top of history (rather than bottom, which
# is the tmux default). Format notes:
#   #{?cond,then,else}      — ternary
#   #{e|-|:x,y}             — arithmetic (x - y)
#   #,                      — escaped comma inside ternary "then" clause
#   #{e|>|:x,y}             — greater-than check
#   #{==:x,y}               — equality check
#   #{&&:a,b}               — logical AND
#   #{search_count}         — number of search results (tmux 3.5+)
#   #{search_count_partial} — 1 if search timed out before completing
%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"
%hidden COPY_MODE_MARKER="#[align=left#,fg=black#,bg=yellow]  -- COPY --  #[default]"
%hidden COPY_MODE_LEFT="$COPY_MODE_MARKER"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"
%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_IS_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_IS_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden OFFSET_FROM_TOP="#{e|-|:#{history_size},#{scroll_position}}"
%hidden COPY_MODE_LOCATION="[$OFFSET_FROM_TOP/#{history_size}]"
%hidden COPY_MODE_RIGHT="#[align=right#,bg=yellow#,fg=black]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"

set-option -g pane-border-format "#{?$IS_COPY_MODE,$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,}"

# Hide the default position indicator when entering copy mode.
# https://github.com/wincent/wincent/issues/155
set-hook -g pane-mode-changed {
  if-shell -F '$IS_COPY_MODE' {
    send-keys -X toggle-position
  }
}

# =======================================================================
# = Appearance — Status Bar
# =======================================================================

set -g status on
set -g status-interval 15
set -g status-justify left
set -g status-position top
set -g status-style bg=terminal,fg=terminal

# --- Left ---
set -g status-left-length 70
set -g status-left "#[fg=colour237]#{?client_prefix,#[fg=colour012],#[fg=colour237]}#S #[fg=colour237] "

# --- Window list ---
setw -g window-status-format         "#[bg=terminal]#{?window_activity_flag,#{?window_bell_flag,#[fg=brightred]▲,#[fg=colour243]⦁},#[fg=colour235]⦁}#[bg=terminal]"
setw -g window-status-current-format "#{?window_zoomed_flag,#[fg=yellow]#(printf '\uEB81')  #W,#W}#[bg=terminal]"
setw -g window-status-activity-style bg=terminal,fg=colour243
setw -g window-status-bell-style     bg=terminal,fg=brightred
setw -g window-status-current-style  bg=terminal,fg=colour004

# --- Right ---
%hidden STATUS_PREFIX="#{?client_prefix,#[fg=colour012]#(echo $(tmux show-option -gqv prefix | tr \"[:lower:]\" \"[:upper:]\" | sed 's/C-/\^/')) #[fg=colour237]⦁ ,}"
%hidden STATUS_NPM="#(~/.config/tmux/scripts/tmux-npm-status)"
%hidden STATUS_GITHUB="#(~/.config/tmux/scripts/tmux-github-status)"
%hidden STATUS_WEATHER="#[fg=colour243]#(~/.config/tmux/scripts/tmux-weather)#[fg=colour237] ⦁ "
%hidden STATUS_BATTERY="#(~/.config/tmux/scripts/tmux-battery)"
%hidden STATUS_WIFI="#[fg=colour237]#(wifi)#[fg=colour237] ⦁ "
%hidden STATUS_PRAYER_TIMES="#[fg=colour243]#(~/.config/tmux/scripts/get-prayer) #[fg=colour237]⦁ "
# Extra trailing space prevents date from overlapping with Nerd Font glyphs
%hidden STATUS_DATE_TIME="#[fg=colour237]CAI: #(TZ=':/usr/share/zoneinfo/Africa/Cairo' date +%%H:%%M) ⦁ #[fg=colour243]%A, %d %b %Y %H:%M#[fg=colour237] "

set -g status-right-length 300
set -g status-right "${STATUS_PREFIX}${STATUS_NPM}${STATUS_GITHUB}${STATUS_WEATHER}${STATUS_BATTERY}${STATUS_WIFI}${STATUS_PRAYER_TIMES}${STATUS_DATE_TIME}"

# =======================================================================
# = Host-specific overrides
# =======================================================================

if-shell 'test -f "$HOST_CONFIGS/tmux.conf"' 'source -q "$HOST_CONFIGS/tmux.conf"'
