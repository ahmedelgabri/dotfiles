"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
linemode = "size"
ratio = [0, 2, 6]
sort_by = "natural"
sort_dir_first = true
show_hidden = true

[preview]
max_width = 3024  # default = 600
max_height = 1964 # default = 900
# https://yazi-rs.github.io/docs/tips#make-yazi-even-faster
image_delay = 0

[plugin]
prepend_previewers = [{ url = "*.md", run = "glow" }]
prepend_fetchers = [
  { url = "*", run = "git", group = "git" },
  { url = "*/", run = "git", group = "git" },
]

[opener]
play = [
  { run = 'mpv --force-window "$@"' },
  { run = 'iina --no-stdin "$@"' },
  { run = '''mediainfo "$1"; echo "Press enter to exit"; read''', block = true, desc = "Show media info" },
]

[open]
prepend_rules = [
  { url = "*.{ass,srt,ssa,sty,sup,vtt}", use = [
    "subtitle",
    "edit",
  ] },
]
